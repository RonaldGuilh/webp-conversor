<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WebP Converter</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, ::before, *::after { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#0c0e12; --card:#141820; --card-alt:#1a1f2e;
  --accent:#f97316; --accent-light:#fb923c; --accent-glow:rgba(249,115,22,.3);
  --pink:#ec4899; --txt:#f1f5f9; --txt2:#94a3b8; --txt3:#64748b;
  --border:rgba(255,255,255,.06); --ok:#22c55e; --r:14px;
}
body {
  font-family:'Sora',sans-serif; background:var(--bg); color:var(--txt);
  min-height:100vh; padding:48px 20px 80px;
  background-image:
    radial-gradient(ellipse at 15% 60%,rgba(249,115,22,.06) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(139,92,246,.06) 0%,transparent 55%);
}
.wrap { max-width:680px; margin:0 auto; }
.hdr { text-align:center; margin-bottom:38px; }
.hdr__badge {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(249,115,22,.1); border:1px solid rgba(249,115,22,.2);
  border-radius:30px; padding:5px 16px; font-size:13px;
  color:var(--accent-light); margin-bottom:16px; letter-spacing:.4px;
}
.hdr__badge .dot { width:7px; height:7px; background:var(--accent); border-radius:50%; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
.hdr h1 {
  font-size:36px; font-weight:700; line-height:1.18;
  background:linear-gradient(135deg,#fff 25%,var(--accent-light));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  background-clip:text; margin-bottom:8px;
}
.hdr p { color:var(--txt2); font-size:14px; font-weight:300; }
.drop {
  border:2px dashed var(--border); border-radius:var(--r);
  padding:38px 20px; text-align:center; cursor:pointer;
  transition:all .3s; background:var(--card); position:relative; overflow:hidden;
}
.drop::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(160deg,transparent 55%,rgba(249,115,22,.025));
  pointer-events:none;
}
.drop:hover,.drop--over { border-color:var(--accent); background:rgba(249,115,22,.04); box-shadow:0 0 36px var(--accent-glow); }
.drop--over .drop__icon { transform:scale(1.1); }
.drop__icon {
  width:52px; height:52px; margin:0 auto 12px;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  border-radius:15px; display:flex; align-items:center; justify-content:center;
  font-size:24px; box-shadow:0 6px 20px rgba(249,115,22,.3);
  transition:transform .3s; position:relative; z-index:1;
}
.drop h3 { font-size:15px; font-weight:600; margin-bottom:4px; position:relative; z-index:1; }
.drop p  { color:var(--txt2); font-size:13px; position:relative; z-index:1; }
.drop p span { color:var(--accent-light); font-weight:500; }
.drop__tags { margin-top:10px; display:flex; justify-content:center; gap:5px; flex-wrap:wrap; position:relative; z-index:1; }
.drop__tag {
  background:rgba(255,255,255,.05); border:1px solid var(--border);
  border-radius:5px; padding:2px 8px; font-size:11px;
  color:var(--txt3); font-family:'JetBrains Mono',monospace;
}
.file-input { display:none; }
.proc { margin-top:18px; }
.proc__head { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
.proc__head span { font-size:12px; color:var(--txt2); }
.proc__head b  { color:var(--accent-light); font-weight:600; }
.proc__track  { height:3px; background:var(--card-alt); border-radius:2px; overflow:hidden; }
.proc__fill   { height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--pink)); border-radius:2px; transition:width .4s ease; }
.list { display:flex; flex-direction:column; gap:9px; margin-top:18px; }
.item {
  background:var(--card); border:1px solid var(--border); border-radius:var(--r);
  padding:13px 15px; transition:border-color .3s, box-shadow .3s;
  animation:slide .3s cubic-bezier(.22,.68,0,1.2);
}
@keyframes slide { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
.item--active { border-color:rgba(249,115,22,.4); box-shadow:0 0 14px rgba(249,115,22,.08); }
.item__row { display:flex; align-items:center; gap:13px; }
.item__thumb {
  width:56px; height:56px; border-radius:9px; object-fit:cover;
  border:1px solid var(--border); flex-shrink:0; background:#161923;
}
.item__ph {
  width:56px; height:56px; border-radius:9px; flex-shrink:0;
  background:var(--card-alt); border:1px solid var(--border);
  display:flex; align-items:center; justify-content:center;
  font-size:20px; color:var(--txt3);
}
.item__meta { flex:1; min-width:0; }
.item__name {
  font-family:'JetBrains Mono',monospace; font-size:12px;
  color:var(--txt); white-space:nowrap; overflow:hidden;
  text-overflow:ellipsis; margin-bottom:4px;
}
.item__info { font-size:12px; color:var(--txt3); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.item__info .orig     { font-family:'JetBrains Mono',monospace; }
.item__info .arr      { color:var(--txt3); }
.item__info .webp-sz  { color:var(--ok); font-weight:600; font-family:'JetBrains Mono',monospace; }
.sbdg {
  display:inline-block; background:rgba(34,197,94,.1); border:1px solid rgba(34,197,94,.2);
  border-radius:4px; padding:1px 7px; font-size:10.5px; color:var(--ok);
  font-weight:600; font-family:'JetBrains Mono',monospace;
}
.sbdg--neg { background:rgba(239,68,68,.1); border-color:rgba(239,68,68,.25); color:#f87171; }
.item__st { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--txt3); font-style:italic; }
.spin {
  width:13px; height:13px; border:2px solid var(--border);
  border-top-color:var(--accent); border-radius:50%;
  animation:sp .5s linear infinite; flex-shrink:0;
}
@keyframes sp { to{transform:rotate(360deg)} }
.item__rm {
  background:rgba(255,255,255,.05); border:1px solid var(--border);
  border-radius:7px; color:var(--txt3); width:25px; height:25px;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  transition:.2s; font-size:16px; flex-shrink:0;
}
.item__rm:hover { background:rgba(239,68,68,.15); border-color:rgba(239,68,68,.3); color:#ef4444; }
.item__ctrl {
  display:flex; align-items:center; gap:10px;
  margin-top:10px; padding-top:10px; border-top:1px solid var(--border);
}
.item__ctrl label { font-size:11px; color:var(--txt2); white-space:nowrap; font-weight:500; }
.slider {
  flex:1; min-width:60px; -webkit-appearance:none; appearance:none;
  height:5px; border-radius:3px; outline:none; cursor:pointer;
  background:linear-gradient(to right,#ef4444 0%,#f97316 35%,#eab308 60%,#22c55e 100%);
}
.slider::-webkit-slider-thumb {
  -webkit-appearance:none; appearance:none;
  width:18px; height:18px; border-radius:50%; background:#fff;
  cursor:pointer; box-shadow:0 2px 7px rgba(0,0,0,.4);
  border:3px solid var(--accent); transition:transform .12s;
}
.slider::-webkit-slider-thumb:hover { transform:scale(1.14); }
.slider::-moz-range-thumb {
  width:18px; height:18px; border-radius:50%; background:#fff;
  border:3px solid var(--accent); box-shadow:0 2px 7px rgba(0,0,0,.4); cursor:pointer;
}
.slider:disabled { opacity:.28; cursor:not-allowed; }
.qval  { font-family:'JetBrains Mono',monospace; font-size:11.5px; font-weight:600; color:var(--accent-light); min-width:33px; text-align:right; }
.qlocked { font-size:10px; color:var(--txt3); font-style:italic; white-space:nowrap; }
.btn-dl {
  display:inline-flex; align-items:center; gap:5px;
  background:linear-gradient(135deg,var(--accent),var(--pink));
  color:#fff; border:none; border-radius:8px;
  padding:6px 13px; font-size:11.5px; font-weight:600;
  font-family:'Sora',sans-serif; cursor:pointer; transition:all .2s;
  box-shadow:0 3px 10px rgba(249,115,22,.25); text-decoration:none;
  white-space:nowrap; flex-shrink:0;
}
.btn-dl:hover  { transform:translateY(-1px); box-shadow:0 5px 15px rgba(249,115,22,.35); }
.btn-dl:active { transform:translateY(0); }
.btn-dl svg    { width:13px; height:13px; }
.dl-all {
  margin-top:14px; padding:13px 17px;
  background:var(--card); border:1px solid var(--border);
  border-radius:var(--r); display:flex; align-items:center;
  justify-content:space-between; gap:10px;
  animation:slide .3s cubic-bezier(.22,.68,0,1.2);
}
.dl-all > span { font-size:13px; color:var(--txt2); }
.dl-all > span b { color:var(--txt); font-weight:600; }
.btn-dl-all {
  display:inline-flex; align-items:center; gap:6px;
  background:rgba(249,115,22,.1); border:1px solid rgba(249,115,22,.3);
  color:var(--accent-light); border-radius:8px; padding:7px 16px;
  font-size:12.5px; font-weight:500; font-family:'Sora',sans-serif;
  cursor:pointer; transition:.2s; white-space:nowrap;
}
.btn-dl-all:hover { background:rgba(249,115,22,.18); border-color:rgba(249,115,22,.5); }
@media(max-width:440px){
  .hdr h1 { font-size:24px; }
  .dl-all { flex-direction:column; text-align:center; }
  .item__ctrl { flex-wrap:wrap; }
  .item__ctrl .btn-dl { width:100%; justify-content:center; margin-top:4px; }
}
</style>
</head>
<body>
<div class="wrap">
<div class="hdr">
  <div class="hdr__badge"><span class="dot"></span> Conversor WebP</div>
  <h1>Converta suas imagens<br>para WebP</h1>
  <p>Processamento um por vez · saída mínima 200 KB</p>
</div>
<div class="drop" id="drop">
  <div class="drop__icon">🖼️</div>
  <h3>Arraste &amp; solte suas imagens aqui</h3>
  <p>ou <span>clique para selecionar</span></p>
  <div class="drop__tags">
    <span class="drop__tag">JPG</span><span class="drop__tag">PNG</span>
    <span class="drop__tag">GIF</span><span class="drop__tag">BMP</span>
    <span class="drop__tag">TIFF</span><span class="drop__tag">SVG</span>
  </div>
  <input type="file" class="file-input" id="fileInput" multiple accept="image/*">
</div>
<div class="proc" id="proc" style="display:none">
  <div class="proc__head">
    <span>Processando...</span>
    <span><b id="pDone">0</b> / <b id="pTotal">0</b></span>
  </div>
  <div class="proc__track"><div class="proc__fill" id="pFill"></div></div>
</div>
<div class="list" id="list"></div>
<div class="dl-all" id="dlAll" style="display:none">
  <span>Total: <b id="totalCnt">0</b> imagem(ns) · <b id="totalSv">0 B</b> economizados</span>
  <button class="btn-dl-all" id="btnDlAll">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Baixar todas
  </button>
</div>
</div>
<script>
const items   = [];
const queue   = [];
let   nextId  = 0;
let   running = false;
const $drop  = document.getElementById('drop');
const $input = document.getElementById('fileInput');
const $list  = document.getElementById('list');
const $dlAll = document.getElementById('dlAll');
const $proc  = document.getElementById('proc');
$drop.addEventListener('click',     () => $input.click());
$drop.addEventListener('dragover',  e => { e.preventDefault(); $drop.classList.add('drop--over'); });
$drop.addEventListener('dragleave', e => { e.preventDefault(); $drop.classList.remove('drop--over'); });
$drop.addEventListener('drop',      e => { e.preventDefault(); $drop.classList.remove('drop--over'); enqueue(e.dataTransfer.files); });
$input.addEventListener('change',   e => { enqueue(e.target.files); e.target.value = ''; });
function enqueue(fileList) {
  const files = [...fileList].filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  files.forEach(f => {
    const item = {
      id: nextId++, file: f, origSize: f.size,
      thumbUrl: null,
      webpBlob: null, webpUrl: null, webpSize: null,
      quality: 100, minQuality: 1,
      status: 'queued'
    };
    items.push(item);
    queue.push(item);
    renderPlaceholder(item);
  });
  updProgress();
  if (!running) startLoop();
}
async function startLoop() {
  running = true;
  while (queue.length) {
    const item = queue.shift();
    if (item.status === 'removed') continue;
    await processOne(item);
    if (item.status === 'removed') {
      if (item.webpUrl) { URL.revokeObjectURL(item.webpUrl); item.webpUrl = null; }
      continue;
    }
    await wait(50);
  }
  running = false;
  updProgress();
}
async function processOne(item) {
  item.status = 'loading';
  setActive(item, true);
  setSt(item, '<div class="spin"></div> Processando...');
  updProgress();
  try {
    const dataUrl = await readFile(item.file);
    const canvas = await toCanvas(dataUrl);
    item.thumbUrl = makeThumbnail(canvas);
    const blob100  = await encodeWebP(canvas, 100);
    item.webpBlob  = blob100;
    item.webpSize  = blob100.size;
    item.webpUrl   = URL.createObjectURL(blob100);
    item.quality   = 100;
    const TARGET = 150 * 1024;
    item.minQuality = (item.webpSize <= TARGET) ? 100 : await bsearchMin(canvas, TARGET);
    freeCanvas(canvas);
    item.status = 'done';
  } catch (e) {
    console.error('Erro:', item.file.name, e);
    item.status = 'error';
  }
  setActive(item, false);
  patchUI(item);
  updProgress();
  updAllBar();
}
function renderPlaceholder(item) {
  const el = document.createElement('div');
  el.className = 'item';
  el.id = 'item-' + item.id;
  el.innerHTML =
    `<div class="item__row">
       <div class="item__ph" id="th-${item.id}">🖼️</div>
       <div class="item__meta">
         <div class="item__name">${esc(item.file.name)}</div>
         <div class="item__info" id="inf-${item.id}">
           <span class="orig">${fmt(item.origSize)}</span>
           <span class="item__st" id="st-${item.id}">Na fila...</span>
         </div>
       </div>
       <button class="item__rm" id="rm-${item.id}">&times;</button>
     </div>`;
  el.querySelector('.item__rm').addEventListener('click', () => removeItem(item.id));
  $list.appendChild(el);
}
function patchUI(item) {
  const el = document.getElementById('item-' + item.id);
  if (!el) return;
  if (item.status === 'error') {
    setSt(item, '<span style="color:#f87171">Erro ao converter</span>');
    return;
  }
  if (item.status !== 'done') return;
  const ph  = document.getElementById('th-' + item.id);
  const img = document.createElement('img');
  img.className = 'item__thumb';
  img.src = item.thumbUrl;
  img.alt = '';
  ph.replaceWith(img);
  writeSizes(item);
  const locked = item.minQuality >= 100;
  const ctrl   = document.createElement('div');
  ctrl.className = 'item__ctrl';
  ctrl.innerHTML =
    `<label>Qualidade</label>
     <input type="range" class="slider" min="${item.minQuality}" max="100" value="100"
            id="sl-${item.id}" ${locked ? 'disabled' : ''}>
     <span class="qval" id="qv-${item.id}">100%</span>
     ${locked ? '<span class="qlocked">já <= 200 KB</span>' : ''}
     <a href="${item.webpUrl}"
        download="${item.file.name.replace(/\.[^.]+$/, '.webp')}"
        class="btn-dl" id="dl-${item.id}">
       <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
            stroke-linecap="round" stroke-linejoin="round">
         <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
         <polyline points="7 10 12 15 17 10"/>
         <line x1="12" y1="15" x2="12" y2="3"/></svg>
       Baixar
     </a>`;
  if (!locked) {
    let timer = null;
    ctrl.querySelector('.slider').addEventListener('input', e => {
      const v      = Math.max(+e.target.value, item.minQuality);
      e.target.value = v;
      item.quality   = v;
      document.getElementById('qv-' + item.id).textContent = v + '%';
      clearTimeout(timer);
      timer = setTimeout(() => reencode(item), 300);
    });
  }
  el.appendChild(ctrl);
}
async function reencode(item) {
  try {
    const dataUrl = await readFile(item.file);
    const canvas  = await toCanvas(dataUrl);
    const blob    = await encodeWebP(canvas, item.quality);
    freeCanvas(canvas);
    if (item.webpUrl) URL.revokeObjectURL(item.webpUrl);
    item.webpBlob = blob;
    item.webpSize = blob.size;
    item.webpUrl  = URL.createObjectURL(blob);
    writeSizes(item);
    document.getElementById('dl-' + item.id).href = item.webpUrl;
    updAllBar();
  } catch (e) { console.error(e); }
}
function removeItem(id) {
  const idx = items.findIndex(i => i.id === id);
  if (idx < 0) return;
  const item = items[idx];
  item.status = 'removed';
  if (item.webpUrl) URL.revokeObjectURL(item.webpUrl);
  const qi = queue.indexOf(item);
  if (qi >= 0) queue.splice(qi, 1);
  items.splice(idx, 1);
  document.getElementById('item-' + id)?.remove();
  updProgress();
  updAllBar();
}
function setActive(item, on) {
  document.getElementById('item-' + item.id)?.classList.toggle('item--active', on);
}
function setSt(item, html) {
  const el = document.getElementById('st-' + item.id);
  if (el) el.innerHTML = html;
}
function writeSizes(item) {
  const saved = item.origSize - item.webpSize;
  const pct   = Math.round((saved / item.origSize) * 100);
  document.getElementById('inf-' + item.id).innerHTML =
    `<span class="orig">${fmt(item.origSize)}</span>
     <span class="arr">-></span>
     <span class="webp-sz">${fmt(item.webpSize)}</span>
     <span class="sbdg ${pct < 0 ? 'sbdg--neg' : ''}">${pct > 0 ? '-' : '+'}${Math.abs(pct)}%</span>`;
}
function updProgress() {
  const total = items.length;
  const done  = items.filter(i => i.status === 'done' || i.status === 'error').length;
  if (total > 0 && done < total) {
    $proc.style.display = 'block';
    document.getElementById('pDone').textContent  = done;
    document.getElementById('pTotal').textContent = total;
    document.getElementById('pFill').style.width  = (done / total * 100) + '%';
  } else {
    setTimeout(() => { $proc.style.display = 'none'; }, 520);
  }
}
function updAllBar() {
  const ready = items.filter(i => i.webpBlob);
  if (ready.length) {
    $dlAll.style.display = 'flex';
    document.getElementById('totalCnt').textContent = ready.length;
    const saved = ready.reduce((s, i) => s + (i.origSize - i.webpSize), 0);
    document.getElementById('totalSv').textContent  = fmt(Math.abs(saved)) + (saved < 0 ? ' a mais' : ' menos');
  } else {
    $dlAll.style.display = 'none';
  }
}
document.getElementById('btnDlAll').addEventListener('click', async () => {
  for (const item of items) {
    if (!item.webpBlob) continue;
    const a = document.createElement('a');
    a.href = item.webpUrl;
    a.download = item.file.name.replace(/\.[^.]+$/, '.webp');
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    await wait(180);
  }
});
function readFile(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload  = e => res(e.target.result);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}
function toCanvas(dataUrl) {
  return new Promise(res => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width  = img.naturalWidth;
      c.height = img.naturalHeight;
      c.getContext('2d').drawImage(img, 0, 0);
      res(c);
    };
    img.src = dataUrl;
  });
}
function makeThumbnail(canvas) {
  const maxW  = 120;
  const scale = Math.min(1, maxW / canvas.width);
  const tc    = document.createElement('canvas');
  tc.width    = Math.round(canvas.width  * scale);
  tc.height   = Math.round(canvas.height * scale);
  tc.getContext('2d').drawImage(canvas, 0, 0, tc.width, tc.height);
  const url   = tc.toDataURL();
  freeCanvas(tc);
  return url;
}
function encodeWebP(canvas, quality) {
  return new Promise(res => canvas.toBlob(res, 'image/webp', quality / 100));
}
function freeCanvas(canvas) {
  canvas.width  = 1;
  canvas.height = 1;
}
async function bsearchMin(canvas, target) {
  const sizeAt = q => new Promise(res =>
    canvas.toBlob(b => res(b.size), 'image/webp', q / 100)
  );
  if (await sizeAt(1) >= target) return 1;
  let lo = 1, hi = 100;
  while (lo < hi) {
    const mid = (lo + hi) >> 1;
    (await sizeAt(mid)) < target ? lo = mid + 1 : hi = mid;
  }
  return lo;
}
function wait(ms) { return new Promise(r => setTimeout(r, ms)); }
function fmt(b) {
  if (b < 1024)    return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(2) + ' MB';
}
function esc(s) {
  const d = document.createElement('div');
  d.appendChild(document.createTextNode(s));
  return d.innerHTML;
}
</script>
</body>
</html>
